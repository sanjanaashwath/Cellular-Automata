<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conway's Game of Life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <style>
    /* ====== DESIGN TOKENS ====== */
    :root, [data-theme="light"] {
      --color-bg:             #f7f6f2;
      --color-surface:        #f9f8f5;
      --color-surface-2:      #fbfbf9;
      --color-surface-offset: #f3f0ec;
      --color-surface-dynamic:#e6e4df;
      --color-divider:        #dcd9d5;
      --color-border:         #d4d1ca;
      --color-text:           #28251d;
      --color-text-muted:     #7a7974;
      --color-text-faint:     #bab9b4;
      --color-primary:        #01696f;
      --color-primary-hover:  #0c4e54;
      --color-primary-active: #0f3638;
      --color-primary-highlight: #cedcd8;
      --color-error:          #a12c7b;
      --color-success:        #437a22;
      --color-cell-alive:     #01696f;
      --color-cell-hover:     rgba(1,105,111,0.4);
      --color-grid:           #dcd9d5;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
      --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --radius-sm: 0.375rem; --radius-md: 0.5rem;
      --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
      --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
    }

    [data-theme="dark"] {
      --color-bg:             #171614;
      --color-surface:        #1c1b19;
      --color-surface-2:      #201f1d;
      --color-surface-offset: #1d1c1a;
      --color-surface-dynamic:#2d2c2a;
      --color-divider:        #262523;
      --color-border:         #393836;
      --color-text:           #cdccca;
      --color-text-muted:     #797876;
      --color-text-faint:     #5a5957;
      --color-primary:        #4f98a3;
      --color-primary-hover:  #227f8b;
      --color-primary-active: #1a626b;
      --color-primary-highlight: #313b3b;
      --color-error:          #d163a7;
      --color-success:        #6daa45;
      --color-cell-alive:     #4f98a3;
      --color-cell-hover:     rgba(79,152,163,0.3);
      --color-grid:           #262523;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
      --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
      --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
    }

    /* ====== BASE ====== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }
    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--color-text);
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
    input, select { font: inherit; color: inherit; }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ====== LAYOUT ====== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-6);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
      gap: var(--space-4);
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      text-decoration: none;
      color: var(--color-text);
    }

    .logo-svg { flex-shrink: 0; }

    .logo-text {
      font-size: var(--text-base);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .logo-sub {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      font-weight: 400;
      display: block;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .app-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ====== SIDEBAR ====== */
    .sidebar {
      width: 280px;
      min-width: 240px;
      max-width: 320px;
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-section {
      padding: var(--space-5) var(--space-5) var(--space-4);
      border-bottom: 1px solid var(--color-divider);
    }

    .sidebar-section:last-child { border-bottom: none; }

    .sidebar-label {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      margin-bottom: var(--space-4);
    }

    /* ====== CANVAS AREA ====== */
    .canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      background: var(--color-bg);
      position: relative;
    }

    #gameCanvas {
      image-rendering: pixelated;
      cursor: crosshair;
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-md);
      display: block;
    }

    /* ====== BUTTONS ====== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 500;
      border-radius: var(--radius-md);
      transition: color var(--transition-interactive), background var(--transition-interactive), border-color var(--transition-interactive), box-shadow var(--transition-interactive);
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
    .btn-primary:active { background: var(--color-primary-active); }

    .btn-secondary {
      background: var(--color-surface-2);
      color: var(--color-text);
      border-color: var(--color-border);
    }
    .btn-secondary:hover { background: var(--color-surface-dynamic); }
    .btn-secondary:active { background: var(--color-surface-offset); }

    .btn-ghost {
      background: transparent;
      color: var(--color-text-muted);
      padding: var(--space-2);
    }
    .btn-ghost:hover { color: var(--color-text); background: var(--color-surface-dynamic); }

    .btn-danger {
      background: transparent;
      color: var(--color-error);
      border-color: oklch(from var(--color-error) l c h / 0.3);
    }
    .btn-danger:hover { background: oklch(from var(--color-error) l c h / 0.08); }

    .btn-sm {
      padding: var(--space-1) var(--space-3);
      font-size: var(--text-xs);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: var(--radius-md);
    }

    .run-btn {
      min-width: 120px;
      gap: var(--space-2);
    }

    /* ====== FORM ELEMENTS ====== */
    .field {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      margin-bottom: var(--space-4);
    }

    .field:last-child { margin-bottom: 0; }

    label {
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--color-text-muted);
    }

    input[type="number"],
    select {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-sm);
      color: var(--color-text);
      width: 100%;
      transition: border-color var(--transition-interactive), box-shadow var(--transition-interactive);
    }

    input[type="number"]:focus,
    select:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15);
      outline: none;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--color-primary);
      cursor: pointer;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .range-value {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-primary);
      min-width: 3.5ch;
      text-align: right;
    }

    /* ====== STATS ====== */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }

    .stat-card {
      background: var(--color-surface-offset);
      border: 1px solid oklch(from var(--color-text) l c h / 0.06);
      border-radius: var(--radius-md);
      padding: var(--space-3);
    }

    .stat-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-bottom: var(--space-1);
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text);
      font-variant-numeric: tabular-nums;
    }

    /* ====== PATTERN BUTTONS ====== */
    .patterns-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }

    .pattern-btn {
      font-size: var(--text-xs);
      padding: var(--space-2) var(--space-3);
      text-align: left;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text);
      cursor: pointer;
      transition: background var(--transition-interactive), border-color var(--transition-interactive);
    }

    .pattern-btn:hover {
      background: var(--color-primary-highlight);
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    /* ====== DRAW MODE PILL ====== */
    .mode-group {
      display: flex;
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .mode-btn {
      flex: 1;
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-xs);
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: background var(--transition-interactive), color var(--transition-interactive);
      color: var(--color-text-muted);
      border: none;
      background: transparent;
    }

    .mode-btn.active {
      background: var(--color-primary);
      color: #fff;
    }

    /* ====== STATUS BAR ====== */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-2) var(--space-6);
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      flex-shrink: 0;
      gap: var(--space-4);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: 2px var(--space-2);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 500;
    }

    .status-pill.running {
      background: oklch(from var(--color-success) l c h / 0.15);
      color: var(--color-success);
    }

    .status-pill.paused {
      background: oklch(from var(--color-text-muted) l c h / 0.1);
      color: var(--color-text-muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-dot.pulse {
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ====== THEME TOGGLE ====== */
    .theme-toggle {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      cursor: pointer;
      transition: color var(--transition-interactive), background var(--transition-interactive);
    }

    .theme-toggle:hover { color: var(--color-text); background: var(--color-surface-dynamic); }

    /* ====== DIVIDER ====== */
    .divider {
      height: 1px;
      background: var(--color-divider);
      margin: var(--space-2) 0;
    }

    /* ====== HELP TEXT ====== */
    .help-text {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      line-height: 1.5;
    }

    /* ====== TOOLTIP ====== */
    [title] { position: relative; }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        max-width: 100%;
        min-width: 0;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        border-right: none;
        border-bottom: 1px solid var(--color-border);
      }

      .app-layout { flex-direction: column; }

      .sidebar-section {
        flex-shrink: 0;
        min-width: 200px;
        border-right: 1px solid var(--color-divider);
        border-bottom: none;
      }

      .canvas-wrap { min-height: 0; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">
    <!-- Inline SVG logo: a 5x5 glider pattern -->
    <svg class="logo-svg" aria-label="Conway's Game of Life logo" width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="8" fill="var(--color-primary)" opacity="0.12"/>
      <rect x="6"  y="6"  width="6" height="6" rx="1.5" fill="var(--color-primary)"/>
      <rect x="14" y="6"  width="6" height="6" rx="1.5" fill="var(--color-primary)" opacity="0.4"/>
      <rect x="22" y="6"  width="6" height="6" rx="1.5" fill="var(--color-primary)"/>
      <rect x="22" y="14" width="6" height="6" rx="1.5" fill="var(--color-primary)"/>
      <rect x="14" y="22" width="6" height="6" rx="1.5" fill="var(--color-primary)"/>
    </svg>
    <span>
      <span class="logo-text">Game of Life</span>
      <span class="logo-sub">Conway's Cellular Automaton</span>
    </span>
  </a>
  <div class="header-actions">
    <button class="theme-toggle" id="themeToggle" aria-label="Switch theme" title="Toggle dark/light mode">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- SIMULATION CONTROLS -->
    <div class="sidebar-section">
      <div class="sidebar-label">Simulation</div>
      <div style="display:flex; gap: var(--space-2); margin-bottom: var(--space-4);">
        <button class="btn btn-primary run-btn" id="runBtn">
          <svg id="runIcon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          <span id="runLabel">Run</span>
        </button>
        <button class="btn btn-secondary btn-icon" id="stepBtn" title="Step forward one generation">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon points="5,3 15,12 5,21" fill="currentColor" stroke="none"/>
            <line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
        <button class="btn btn-secondary btn-icon" id="clearBtn" title="Clear grid">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2 0 0 1-2,2H7a2,2 0 0 1-2,-2V6m3,0V4a2,2 0 0 1 2,-2h4a2,2 0 0 1 2,2v2"/></svg>
        </button>
      </div>

      <div class="field">
        <label for="speedRange">Speed: <span id="speedLabel">10</span> gen/s</label>
        <div class="range-row">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
          <input type="range" id="speedRange" min="1" max="60" value="10" step="1">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
    </div>

    <!-- GRID SIZE -->
    <div class="sidebar-section">
      <div class="sidebar-label">Grid</div>
      <div class="field">
        <label for="gridCols">Columns</label>
        <input type="number" id="gridCols" min="5" max="500" value="80">
      </div>
      <div class="field">
        <label for="gridRows">Rows</label>
        <input type="number" id="gridRows" min="5" max="500" value="50">
      </div>
      <button class="btn btn-secondary" style="width:100%" id="resizeBtn">Apply Grid Size</button>
    </div>

    <!-- DRAW MODE -->
    <div class="sidebar-section">
      <div class="sidebar-label">Draw Mode</div>
      <div class="mode-group" style="margin-bottom: var(--space-4);">
        <button class="mode-btn active" data-mode="toggle" id="modeToggle">Toggle</button>
        <button class="mode-btn" data-mode="alive" id="modeAlive">Set Alive</button>
        <button class="mode-btn" data-mode="dead" id="modeDead">Set Dead</button>
      </div>
      <p class="help-text">Click or drag on the grid to edit cells.</p>
    </div>

    <!-- PATTERNS -->
    <div class="sidebar-section">
      <div class="sidebar-label">Patterns</div>
      <div class="patterns-grid">
        <button class="pattern-btn" data-pattern="glider">Glider</button>
        <button class="pattern-btn" data-pattern="blinker">Blinker</button>
        <button class="pattern-btn" data-pattern="toad">Toad</button>
        <button class="pattern-btn" data-pattern="beacon">Beacon</button>
        <button class="pattern-btn" data-pattern="pulsar">Pulsar</button>
        <button class="pattern-btn" data-pattern="rpentomino">R-Pentomino</button>
        <button class="pattern-btn" data-pattern="glidergun">Glider Gun</button>
        <button class="pattern-btn" data-pattern="random">Random</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="sidebar-section">
      <div class="sidebar-label">Statistics</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Generation</div>
          <div class="stat-value" id="statGen">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Alive Cells</div>
          <div class="stat-value" id="statAlive">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Population %</div>
          <div class="stat-value" id="statPop">0.0%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Born / Died</div>
          <div class="stat-value" id="statDelta">+0 / -0</div>
        </div>
      </div>
    </div>

  </aside>

  <!-- CANVAS AREA -->
  <main class="canvas-wrap" id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
  </main>

</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <div id="statusPill" class="status-pill paused">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Paused</span>
  </div>
  <span id="statusInfo">Click cells to toggle • Drag to paint • Press Space to run/pause</span>
  <span id="statusPos" style="font-family: var(--font-mono);">—</span>
</div>

<script>
// ===== THEME TOGGLE =====
(function(){
  const root = document.documentElement;
  const btn = document.getElementById('themeToggle');
  const sunSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  const moonSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  let theme = 'dark';
  btn.innerHTML = sunSVG;
  btn.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', theme);
    btn.innerHTML = theme === 'dark' ? sunSVG : moonSVG;
    renderer.redraw();
  });
})();

// ===== GAME ENGINE =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const state = {
  cols: 80,
  rows: 50,
  grid: null,
  nextGrid: null,
  running: false,
  generation: 0,
  lastAlivePrev: 0,
  born: 0,
  died: 0,
  drawMode: 'toggle',
  isPainting: false,
  paintValue: null,
  speed: 10,
  animFrame: null,
  lastTickTime: 0,
  cellSize: 12,
};

// ---- Grid helpers ----
function createGrid(cols, rows) {
  return new Uint8Array(cols * rows);
}

function idx(c, r) { return r * state.cols + c; }

function getCell(grid, c, r) {
  if (c < 0 || c >= state.cols || r < 0 || r >= state.rows) return 0;
  return grid[idx(c, r)];
}

function countNeighbors(grid, c, r) {
  let n = 0;
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      n += getCell(grid, c + dc, r + dr);
    }
  }
  return n;
}

function initGame(cols, rows) {
  state.cols = cols;
  state.rows = rows;
  state.grid = createGrid(cols, rows);
  state.nextGrid = createGrid(cols, rows);
  state.generation = 0;
  state.born = 0;
  state.died = 0;
  state.lastAlivePrev = 0;
  updateStats();
}

function step() {
  const { cols, rows, grid, nextGrid } = state;
  let born = 0, died = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const alive = grid[idx(c, r)];
      const n = countNeighbors(grid, c, r);
      let next = 0;
      if (alive) {
        next = (n === 2 || n === 3) ? 1 : 0;
        if (next === 0) died++;
      } else {
        next = (n === 3) ? 1 : 0;
        if (next === 1) born++;
      }
      nextGrid[idx(c, r)] = next;
    }
  }
  // Swap grids
  state.grid.set(nextGrid);
  state.generation++;
  state.born = born;
  state.died = died;
  updateStats();
  renderer.redraw();
}

// ---- Stats ----
function updateStats() {
  let alive = 0;
  for (let i = 0; i < state.grid.length; i++) alive += state.grid[i];
  const total = state.cols * state.rows;
  document.getElementById('statGen').textContent = state.generation.toLocaleString();
  document.getElementById('statAlive').textContent = alive.toLocaleString();
  document.getElementById('statPop').textContent = (alive / total * 100).toFixed(1) + '%';
  document.getElementById('statDelta').textContent = `+${state.born.toLocaleString()} / -${state.died.toLocaleString()}`;
}

// ---- Renderer ----
const renderer = {
  computeCellSize() {
    const wrap = document.getElementById('canvasWrap');
    const maxW = wrap.clientWidth - 32;
    const maxH = wrap.clientHeight - 32;
    const byW = Math.floor(maxW / state.cols);
    const byH = Math.floor(maxH / state.rows);
    return Math.max(2, Math.min(32, byW, byH));
  },

  resize() {
    state.cellSize = this.computeCellSize();
    canvas.width = state.cols * state.cellSize;
    canvas.height = state.rows * state.cellSize;
    this.redraw();
  },

  redraw() {
    const cs = state.cellSize;
    const style = getComputedStyle(document.documentElement);
    const bgColor = style.getPropertyValue('--color-bg').trim();
    const aliveColor = style.getPropertyValue('--color-cell-alive').trim();
    const gridColor = style.getPropertyValue('--color-grid').trim();

    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw cells
    ctx.fillStyle = aliveColor;
    for (let r = 0; r < state.rows; r++) {
      for (let c = 0; c < state.cols; c++) {
        if (state.grid[idx(c, r)]) {
          ctx.fillRect(c * cs, r * cs, cs - 1, cs - 1);
        }
      }
    }

    // Draw grid lines (only if cell size >= 4)
    if (cs >= 4) {
      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      for (let c = 0; c <= state.cols; c++) {
        ctx.moveTo(c * cs + 0.5, 0);
        ctx.lineTo(c * cs + 0.5, canvas.height);
      }
      for (let r = 0; r <= state.rows; r++) {
        ctx.moveTo(0, r * cs + 0.5);
        ctx.lineTo(canvas.width, r * cs + 0.5);
      }
      ctx.stroke();
    }
  }
};

// ---- Animation loop ----
function tick(ts) {
  if (!state.running) return;
  const interval = 1000 / state.speed;
  if (ts - state.lastTickTime >= interval) {
    step();
    state.lastTickTime = ts;
  }
  state.animFrame = requestAnimationFrame(tick);
}

function startRun() {
  if (state.running) return;
  state.running = true;
  state.lastTickTime = 0;
  state.animFrame = requestAnimationFrame(tick);
  updateRunUI();
}

function stopRun() {
  state.running = false;
  if (state.animFrame) cancelAnimationFrame(state.animFrame);
  updateRunUI();
}

function toggleRun() {
  state.running ? stopRun() : startRun();
}

function updateRunUI() {
  const runBtn = document.getElementById('runBtn');
  const runIcon = document.getElementById('runIcon');
  const runLabel = document.getElementById('runLabel');
  const statusPill = document.getElementById('statusPill');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  if (state.running) {
    runBtn.classList.remove('btn-primary');
    runBtn.classList.add('btn-secondary');
    runIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    runLabel.textContent = 'Pause';
    statusPill.className = 'status-pill running';
    statusDot.classList.add('pulse');
    statusText.textContent = 'Running';
  } else {
    runBtn.classList.add('btn-primary');
    runBtn.classList.remove('btn-secondary');
    runIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
    runLabel.textContent = 'Run';
    statusPill.className = 'status-pill paused';
    statusDot.classList.remove('pulse');
    statusText.textContent = 'Paused';
  }
}

// ---- Canvas interaction ----
function canvasCell(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  const c = Math.floor(x / state.cellSize);
  const r = Math.floor(y / state.cellSize);
  if (c >= 0 && c < state.cols && r >= 0 && r < state.rows) return { c, r };
  return null;
}

function paintCell(c, r) {
  const i = idx(c, r);
  if (state.drawMode === 'toggle') {
    if (state.paintValue === null) state.paintValue = state.grid[i] ? 0 : 1;
    state.grid[i] = state.paintValue;
  } else if (state.drawMode === 'alive') {
    state.grid[i] = 1;
  } else {
    state.grid[i] = 0;
  }
  updateStats();
  renderer.redraw();
}

canvas.addEventListener('mousedown', (e) => {
  const cell = canvasCell(e);
  if (!cell) return;
  state.isPainting = true;
  state.paintValue = null;
  paintCell(cell.c, cell.r);
  e.preventDefault();
});

canvas.addEventListener('mousemove', (e) => {
  const cell = canvasCell(e);
  if (cell) {
    document.getElementById('statusPos').textContent = `col ${cell.c + 1}, row ${cell.r + 1}`;
  } else {
    document.getElementById('statusPos').textContent = '—';
  }
  if (!state.isPainting || !cell) return;
  paintCell(cell.c, cell.r);
});

canvas.addEventListener('mouseup', () => { state.isPainting = false; state.paintValue = null; });
canvas.addEventListener('mouseleave', () => { state.isPainting = false; state.paintValue = null; });

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const cell = canvasCell(touch);
  if (!cell) return;
  state.isPainting = true;
  state.paintValue = null;
  paintCell(cell.c, cell.r);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const cell = canvasCell(touch);
  if (!state.isPainting || !cell) return;
  paintCell(cell.c, cell.r);
}, { passive: false });

canvas.addEventListener('touchend', () => { state.isPainting = false; });

// ---- Controls ----
document.getElementById('runBtn').addEventListener('click', toggleRun);
document.getElementById('stepBtn').addEventListener('click', () => { stopRun(); step(); });
document.getElementById('clearBtn').addEventListener('click', () => {
  stopRun();
  initGame(state.cols, state.rows);
  renderer.redraw();
});

document.getElementById('resizeBtn').addEventListener('click', () => {
  const newCols = Math.min(500, Math.max(5, parseInt(document.getElementById('gridCols').value, 10) || 80));
  const newRows = Math.min(500, Math.max(5, parseInt(document.getElementById('gridRows').value, 10) || 50));
  stopRun();
  initGame(newCols, newRows);
  renderer.resize();
});

document.getElementById('speedRange').addEventListener('input', (e) => {
  state.speed = parseInt(e.target.value, 10);
  document.getElementById('speedLabel').textContent = state.speed;
});

// Draw mode
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.drawMode = btn.dataset.mode;
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); toggleRun(); }
  if (e.key === 'ArrowRight' || e.key === 'n') { stopRun(); step(); }
  if (e.key === 'c') { stopRun(); initGame(state.cols, state.rows); renderer.redraw(); }
});

// ---- Patterns ----
const PATTERNS = {
  glider: {
    cells: [[1,0],[2,1],[0,2],[1,2],[2,2]],
    w: 3, h: 3
  },
  blinker: {
    cells: [[0,1],[1,1],[2,1]],
    w: 3, h: 3
  },
  toad: {
    cells: [[1,0],[2,0],[3,0],[0,1],[1,1],[2,1]],
    w: 4, h: 2
  },
  beacon: {
    cells: [[0,0],[1,0],[0,1],[3,2],[2,3],[3,3]],
    w: 4, h: 4
  },
  pulsar: {
    cells: [
      [2,0],[3,0],[4,0],[8,0],[9,0],[10,0],
      [0,2],[5,2],[7,2],[12,2],
      [0,3],[5,3],[7,3],[12,3],
      [0,4],[5,4],[7,4],[12,4],
      [2,5],[3,5],[4,5],[8,5],[9,5],[10,5],
      [2,7],[3,7],[4,7],[8,7],[9,7],[10,7],
      [0,8],[5,8],[7,8],[12,8],
      [0,9],[5,9],[7,9],[12,9],
      [0,10],[5,10],[7,10],[12,10],
      [2,12],[3,12],[4,12],[8,12],[9,12],[10,12]
    ],
    w: 13, h: 13
  },
  rpentomino: {
    cells: [[1,0],[2,0],[0,1],[1,1],[1,2]],
    w: 3, h: 3
  },
  glidergun: {
    cells: [
      [24,0],
      [22,1],[24,1],
      [12,2],[13,2],[20,2],[21,2],[34,2],[35,2],
      [11,3],[15,3],[20,3],[21,3],[34,3],[35,3],
      [0,4],[1,4],[10,4],[16,4],[20,4],[21,4],
      [0,5],[1,5],[10,5],[14,5],[16,5],[17,5],[22,5],[24,5],
      [10,6],[16,6],[24,6],
      [11,7],[15,7],
      [12,8],[13,8]
    ],
    w: 36, h: 9
  }
};

function placePattern(name) {
  if (name === 'random') {
    for (let i = 0; i < state.grid.length; i++) {
      state.grid[i] = Math.random() < 0.3 ? 1 : 0;
    }
    state.generation = 0;
    state.born = 0;
    state.died = 0;
    updateStats();
    renderer.redraw();
    return;
  }
  const pat = PATTERNS[name];
  if (!pat) return;
  const offC = Math.floor((state.cols - pat.w) / 2);
  const offR = Math.floor((state.rows - pat.h) / 2);
  pat.cells.forEach(([dc, dr]) => {
    const c = offC + dc;
    const r = offR + dr;
    if (c >= 0 && c < state.cols && r >= 0 && r < state.rows) {
      state.grid[idx(c, r)] = 1;
    }
  });
  updateStats();
  renderer.redraw();
}

document.querySelectorAll('.pattern-btn').forEach(btn => {
  btn.addEventListener('click', () => placePattern(btn.dataset.pattern));
});

// ---- Resize observer ----
const ro = new ResizeObserver(() => renderer.resize());
ro.observe(document.getElementById('canvasWrap'));

// ---- Initialize ----
initGame(state.cols, state.rows);
renderer.resize();
// Place a glider gun to start
placePattern('glidergun');
</script>
